version: "3.8"

services:
  llm-service:
    build: .
    container_name: llm-service
    ports:
      - "8080:8080"
    volumes:
      # Mount your GGUF model file here
      - ./models:/models:rw
    environment:
      - MODEL_PATH=/models/qwen2.5-7b-instruct-q4_k_m.gguf
    command: >
      --model ${MODEL_PATH:-/models/qwen2.5-7b-instruct-q4_k_m.gguf}
      --host 0.0.0.0
      --port 8080
      --ctx-size 4096
    restart: unless-stopped
    networks:
      - poc-net
    
    # GPU support - uncomment when NVIDIA Container Toolkit is installed
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

networks:
  poc-net:
    driver: bridge
