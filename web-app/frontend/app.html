<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Ray Report Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>X-Ray Report Generator</h1>
        <button id="logout" class="btn btn-secondary">Logout</button>
    </header>

    <main class="container">
        <div class="card">
            <h2>Enter X-Ray Findings</h2>
            <textarea id="findings" placeholder="Enter X-ray findings here (e.g., bilateral infiltrates, cardiomegaly, blunted costophrenic angles)..."></textarea>
            
            <div class="actions">
                <button id="generate" class="btn btn-primary">Generate Report</button>
                <button id="clear" class="btn btn-secondary">Clear</button>
            </div>
            
            <p id="error" class="error"></p>
        </div>

        <div class="card" id="result-card" style="display: none;">
            <h2>Interpretation</h2>
            <div id="result"></div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
