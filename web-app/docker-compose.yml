version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: web-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - poc-net

  backend:
    build: ./backend
    container_name: web-backend
    environment:
      - LLM_SERVICE_URL=http://llm-service:8080
    restart: unless-stopped
    networks:
      - poc-net

networks:
  poc-net:
    external: true
